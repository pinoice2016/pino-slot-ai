name: MinRepo Scraper

on:

  schedule:

    - cron: "0 20 * * *"   # JST 5:00

  workflow_dispatch:

jobs:

  scrape:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - run: |

          pip install requests beautifulsoup4 pandas lxml

      - run: |

          python scraper.py
